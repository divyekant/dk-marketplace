repo: ""
poll_interval: 5m

floors:
  paths:
    "src/auth/**": 3
    "src/payments/**": 4
    "config/production.*": 5
    ".env*": 5
    "*.pem": 5
    "*.key": 5
  types:
    enhancement: 4
    question: 5
  authors:
    trusted: []
    unknown: 4
  minimum: 2

deny:
  actions:
    - close_issue
    - merge_pr
    - force_push
    - delete_branch
  paths:
    - ".env*"
    - "*.secret"
    - "*.pem"
    - "*.key"
    - "config/production.*"

guardrails:
  max_actions_per_hour: 10
  max_open_prs: 3
  require_tests: true
  max_files_changed: 10
  dry_run: false

filters:
  labels: ["bug", "enhancement", "help-wanted"]
  ignore_labels: ["wontfix", "on-hold", "discussion"]
  only_new: true
  max_age: 7d

notifications:
  channels:
    - name: github_comment
      type: external
    - name: system
      type: internal
    - name: session
      type: internal
